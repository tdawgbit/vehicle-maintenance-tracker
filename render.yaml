databases:
  - name: revlog-db
    plan: free
    databaseName: revlog
    user: revlog

services:
  - type: web
    name: revlog
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd vehicle_tracker && python -m gunicorn vehicle_tracker.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /accounts/login/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: revlog-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.13.5
